name: Publish to Thunderstore

on:
  push:
    tags:
      - "v*"   # Runs whenever you push a tag like v1.0.0, v1.0.1 etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1 — Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Install .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      # 3 — Download Valheim/BepInEx libs from release assets
      - name: Download libs
        run: |
          mkdir -p libs
          gh release download libs --pattern "*.dll" --dir libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4 — Build the DLL
      - name: Build mod
        run: dotnet build CartAutoCollect.csproj -c Release -o build/

      # 5 — Install tcli (Thunderstore CLI)
      - name: Install tcli
        run: dotnet tool install --global tcli

      # 6 — Publish to Thunderstore
      - name: Publish to Thunderstore
        run: tcli publish --config-path thunderstore.toml --token ${{ secrets.THUNDERSTORE_TOKEN }}